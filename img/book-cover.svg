<svg xmlns="http://www.w3.org/2000/svg" width="440" height="250" viewBox="0 0 440 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0082c9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a4e4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="250" fill="url(#bg)" rx="8"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="440" height="4" fill="url(#accent)" rx="2"/>

  <!-- Docker container icon -->
  <g transform="translate(30, 45)">
    <!-- Container body -->
    <rect x="10" y="25" width="55" height="40" rx="4" fill="none" stroke="#00a4e4" stroke-width="2.5"/>
    <!-- Container lid / top -->
    <path d="M15,25 L15,18 L25,12 L50,12 L60,18 L60,25" fill="none" stroke="#00a4e4" stroke-width="2" stroke-linejoin="round"/>
    <!-- Container grid (docker-style blocks) -->
    <rect x="18" y="32" width="10" height="8" rx="1" fill="#00a4e4" opacity="0.4"/>
    <rect x="32" y="32" width="10" height="8" rx="1" fill="#00a4e4" opacity="0.4"/>
    <rect x="46" y="32" width="10" height="8" rx="1" fill="#00a4e4" opacity="0.4"/>
    <rect x="18" y="44" width="10" height="8" rx="1" fill="#00a4e4" opacity="0.3"/>
    <rect x="32" y="44" width="10" height="8" rx="1" fill="#00a4e4" opacity="0.3"/>
    <rect x="46" y="44" width="10" height="8" rx="1" fill="#00a4e4" opacity="0.3"/>
    <!-- n8n text inside -->
    <text x="37" y="60" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#00a4e4" text-anchor="middle" opacity="0.7">n8n</text>
    <!-- Disk/HDD icon below -->
    <g transform="translate(15, 72)">
      <rect x="0" y="0" width="42" height="14" rx="3" fill="none" stroke="#00a4e4" stroke-width="1.5" opacity="0.6"/>
      <circle cx="34" cy="7" r="3" fill="none" stroke="#00a4e4" stroke-width="1.5" opacity="0.6"/>
      <rect x="4" y="5" width="18" height="4" rx="1" fill="#00a4e4" opacity="0.3"/>
    </g>
  </g>

  <!-- WHMCS badge -->
  <g transform="translate(120, 68)">
    <rect x="0" y="0" width="85" height="32" rx="6" fill="#00a4e4" opacity="0.15" stroke="#00a4e4" stroke-width="1.5"/>
    <text x="42" y="21" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc" text-anchor="middle">WHMCS</text>
  </g>

  <!-- Module title -->
  <text x="240" y="75" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="start">Docker</text>
  <text x="240" y="108" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="start">n8n</text>

  <!-- Subtitle -->
  <text x="240" y="135" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="start">WHMCS Server Module</text>

  <!-- Divider -->
  <rect x="240" y="148" width="60" height="2" fill="#0082c9" rx="1"/>

  <!-- Description -->
  <text x="240" y="172" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">Automated provisioning and management</text>
  <text x="240" y="188" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="start">of n8n instances on Docker</text>

  <!-- PUQ Cloud branding -->
  <g transform="translate(30, 210)">
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0082c9">PUQ</text>
    <text x="55" y="15" font-family="Arial, sans-serif" font-size="12" fill="#64748b">cloud</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(370, 218)">
    <rect x="0" y="0" width="45" height="20" rx="4" fill="#0082c9" opacity="0.2" stroke="#0082c9" stroke-width="1"/>
    <text x="22" y="14" font-family="Arial, sans-serif" font-size="11" fill="#7dd3fc" text-anchor="middle">v2.0</text>
  </g>
</svg>
